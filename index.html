function seed(str,min,max){
 let s=0; for(let c of str)s+=c.charCodeAt(0);
 s=(s*9301+49297)%233280;
 return Math.floor(min+(s/233280)*(max-min));
}

function dob(ht){
 let m=seed(ht,1,12);
 let d=seed(ht+"x",1,28);

 }
}

 let sci=Math.round((s.phy+s.chem+s.bio)/3);

 ["Science",sci],["Social Studies",soc],

 let per=(total/600)*100;
